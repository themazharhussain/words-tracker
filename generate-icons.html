<!doctype html>
<!-- Open this file in Chrome, then click "Generate & Download Icons" -->
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Generate VocabTracker Icons</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 40px;
        background: #f3f4f6;
      }
      button {
        padding: 12px 28px;
        font-size: 15px;
        background: #6366f1;
        color: #fff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      button:hover {
        background: #4f46e5;
      }
      canvas {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        display: block;
      }
      p {
        color: #6b7280;
        font-size: 13px;
        max-width: 420px;
        text-align: center;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h2>VocabTracker Icon Generator</h2>
    <p>
      Click the button below. Three icon PNG files will be downloaded
      automatically. Move them into the <code>icons/</code> folder next to your
      extension files.
    </p>
    <canvas id="c" style="display: none"></canvas>
    <button onclick="generate()">Generate &amp; Download Icons</button>

    <script>
      function drawIcon(size) {
        const canvas = document.getElementById("c");
        canvas.width = canvas.height = size;
        const ctx = canvas.getContext("2d");

        // Background gradient
        const grad = ctx.createLinearGradient(0, 0, size, size);
        grad.addColorStop(0, "#6366f1");
        grad.addColorStop(1, "#8b5cf6");
        const r = size * 0.18;
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(size - r, 0);
        ctx.quadraticCurveTo(size, 0, size, r);
        ctx.lineTo(size, size - r);
        ctx.quadraticCurveTo(size, size, size - r, size);
        ctx.lineTo(r, size);
        ctx.quadraticCurveTo(0, size, 0, size - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.fillStyle = grad;
        ctx.fill();

        // Book emoji / text
        ctx.fillStyle = "#fff";
        ctx.font = `bold ${Math.round(size * 0.55)}px serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("📚", size / 2, size / 2 + size * 0.04);

        return canvas.toDataURL("image/png");
      }

      function download(dataUrl, filename) {
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = filename;
        a.click();
      }

      function generate() {
        [16, 48, 128].forEach((size) => {
          const url = drawIcon(size);
          download(url, `icon${size}.png`);
        });
        alert(
          "✅  3 icons downloaded!\n\nMove icon16.png, icon48.png, and icon128.png into the icons/ folder.",
        );
      }
    </script>
  </body>
</html>
